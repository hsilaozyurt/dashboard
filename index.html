<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Risk Dashboard</title>

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/overview.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/stations.css" />
  <link rel="stylesheet" href="css/station-detail.css" />
  <link rel="stylesheet" href="css/team.css" />
  <link rel="stylesheet" href="css/tahminleme.css" />

  <style>
    .page {
      display: none !important;
    }

    .page.srd-active {
      display: block !important;
    }

    #app {
      min-height: 100vh;
    }

    .sidebar {
      transition: transform 0.25s ease, width 0.25s ease;
    }

    .sidebar:not(.open) {
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main-wrapper {
      transition: margin-left 0.25s ease, width 0.25s ease;
    }

    @media (min-width: 769px) {
      .sidebar.open ~ .main-wrapper {
        margin-left: 0;
      }

      .sidebar:not(.open) ~ .main-wrapper {
        margin-left: 0;
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        height: 100vh;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar:not(.open) {
        transform: translateX(-100%);
      }

      .main-wrapper {
        margin-left: 0 !important;
        width: 100%;
      }
    }

    .topbar-btn,
    .topbar-lang,
    .topbar-theme,
    .sidebar-toggle,
    .topbar-link-btn {
      cursor: pointer;
      user-select: none;
    }

    .topbar-theme {
      min-width: 40px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(120, 150, 180, 0.25);
      background: rgba(20, 35, 55, 0.75);
      color: #c7d7ea;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .topbar-theme:hover {
      background: rgba(42, 75, 120, 0.85);
      color: #ffffff;
    }
  </style>
</head>

<body class="theme-dark">
<div id="app">

  <!-- Sidebar / Drawer başlangıçta açık -->
  <aside class="sidebar open" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon thy-logo-box">
        <img src="assets/thy-logo.png" alt="Turkish Airlines Logo" class="thy-logo-img">
      </div>

      <div>
        <div class="sidebar-logo-title">Safety Risk</div>
        <div class="sidebar-logo-sub">Ground Operations</div>
      </div>
    </div>

    <div class="sidebar-section">Navigation</div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="overview" href="javascript:void(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="nav-label" data-i18n="overview">Overview</span>
      </a>

      <a class="nav-item" data-page="dashboard" href="javascript:void(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="nav-label" data-i18n="dashboard">Dashboard</span>
      </a>

      <a class="nav-item" data-page="stations" href="javascript:void(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        <span class="nav-label" data-i18n="stations">All Stations</span>
      </a>

      <a class="nav-item disabled" data-page="tahminleme" href="javascript:void(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span class="nav-label" data-i18n="tahminleme">Tahminleme</span>
        <span class="nav-badge" data-i18n="soon">Soon</span>
      </a>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-contact">
      <div class="sidebar-contact-label">Contact</div>

      <a class="sidebar-contact-email" href="mailto:safety@thy.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        safety@thy.com
      </a>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">

        <button
          class="sidebar-toggle"
          id="sidebarToggle"
          type="button"
          title="Open / Close Menu"
          aria-label="Open or close sidebar menu"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="topbar-breadcrumb">
          <span class="topbar-breadcrumb-root">Ground Operations Safety</span>
          <span class="topbar-breadcrumb-sep">›</span>
          <span class="topbar-breadcrumb-page" id="topbar-title">Overview</span>
        </div>

        <span class="topbar-badge" id="topbar-badge"></span>
      </div>

      <!-- Header orta menü -->
      <div class="topbar-center">
        <button class="topbar-link-btn" data-sp-link="mudurluk" type="button">
          Müdürlük
        </button>

        <button class="topbar-link-btn" data-sp-link="ekibimiz" type="button">
          Ekibimiz
        </button>

        <div class="topbar-middle-logo">
          <img src="assets/header-logo.png" alt="Header Logo">
        </div>

        <button class="topbar-link-btn" data-sp-link="seflik" type="button">
          Şeflik
        </button>
      </div>

      <div class="topbar-right">
        <span class="topbar-update" id="topbar-update"></span>

        <button class="topbar-btn" id="refreshBtn" type="button" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
        </button>

        <button class="topbar-theme" id="themeBtn" type="button" title="Change Theme">
          🌙
        </button>

        <button class="topbar-lang" id="langBtn" type="button" title="Change Language">
          EN
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <div class="page" id="page-overview"></div>
      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-stations"></div>
      <div class="page" id="page-station-detail"></div>
      <div class="page" id="page-team"></div>
      <div class="page" id="page-tahminleme"></div>
    </main>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- SheetJS / XLSX: Excel dosyalarını okumak için gerekli -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
  var SRD = {};
</script>

<script src="js/data.js"></script>
<script src="js/overview.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/stations.js"></script>
<script src="js/station-detail.js"></script>
<script src="js/team.js"></script>
<script src="js/tahminleme.js"></script>
<script src="js/main.js"></script>

</body>
</html>
